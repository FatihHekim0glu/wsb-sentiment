name: No AI attribution

# House bar: commits and PRs must not carry AI co-author / "Generated with"
# attribution trailers. This guard fails fast if any such marker sneaks in.
# (See also CONTRIBUTING.md -> "Commit hygiene".)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    name: reject AI-attribution trailers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the PR range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan commit messages in the PR range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Case-insensitive markers we never want in commit history.
          pattern='Co-Authored-By:.*(Claude|Anthropic|noreply@anthropic\.com)|Generated with \[?Claude|🤖 Generated with'
          if git log --format='%B' "${BASE_SHA}..${HEAD_SHA}" | grep -Ei "${pattern}"; then
            echo "::error::Found AI-attribution trailer(s) in commit message(s). Remove them (no Co-Authored-By: Claude / 'Generated with Claude')."
            exit 1
          fi
          echo "OK: no AI-attribution trailers found in the PR commit range."
