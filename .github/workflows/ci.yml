name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project (lean extras + dev; NO transformers/torch)
        run: uv pip install --system -e '.[data,viz,ingest,dev]'

      - name: Lint (ruff)
        run: uv run --no-project ruff check src

      - name: Type-check (mypy, strict)
        run: uv run --no-project mypy src

      - name: Test (pytest + coverage gate)
        run: uv run --no-project pytest -q --cov=wsb_sentiment --cov-report=term --cov-fail-under=85
